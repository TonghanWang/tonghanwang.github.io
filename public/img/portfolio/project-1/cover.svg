<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="mechGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0edff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2563eb" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb" opacity="0.7"/>
    </marker>
    <marker id="arrowOut" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg1)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.12">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#2563eb" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#2563eb" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#2563eb" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#2563eb" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#2563eb" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#2563eb" stroke-width="1"/>
  </g>

  <!-- ── Bidder nodes (left) ─────────────────────────────────── -->
  <!-- Bidder 1 -->
  <circle cx="140" cy="160" r="42" fill="url(#nodeGrad)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="153" text-anchor="middle" font-size="11" fill="#6b7280" font-weight="600" letter-spacing="0.5">BIDDER 1</text>
  <text x="140" y="172" text-anchor="middle" font-size="18" fill="#2563eb" font-weight="800">v₁</text>

  <!-- Bidder 2 -->
  <circle cx="130" cy="280" r="42" fill="url(#nodeGrad)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="273" text-anchor="middle" font-size="11" fill="#6b7280" font-weight="600" letter-spacing="0.5">BIDDER 2</text>
  <text x="130" y="292" text-anchor="middle" font-size="18" fill="#2563eb" font-weight="800">v₂</text>

  <!-- Bidder 3 -->
  <circle cx="150" cy="395" r="42" fill="url(#nodeGrad)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="388" text-anchor="middle" font-size="11" fill="#6b7280" font-weight="600" letter-spacing="0.5">BIDDER 3</text>
  <text x="150" y="407" text-anchor="middle" font-size="18" fill="#2563eb" font-weight="800">v₃</text>

  <!-- Arrows: bidders → mechanism -->
  <line x1="183" y1="168" x2="332" y2="218" stroke="#2563eb" stroke-width="1.8" stroke-dasharray="6 3" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="173" y1="280" x2="332" y2="260" stroke="#2563eb" stroke-width="1.8" stroke-dasharray="6 3" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="193" y1="390" x2="332" y2="302" stroke="#2563eb" stroke-width="1.8" stroke-dasharray="6 3" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- ── Central mechanism box ──────────────────────────────── -->
  <rect x="345" y="160" width="210" height="180" rx="18" fill="url(#mechGrad)" filter="url(#shadow)"/>
  <rect x="345" y="160" width="210" height="180" rx="18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Neural net nodes inside mechanism -->
  <!-- Layer 1 -->
  <circle cx="385" cy="220" r="9" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <circle cx="385" cy="250" r="9" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <circle cx="385" cy="280" r="9" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <!-- Layer 2 -->
  <circle cx="450" cy="210" r="9" fill="rgba(255,255,255,0.45)" stroke="white" stroke-width="1.2"/>
  <circle cx="450" cy="250" r="9" fill="rgba(255,255,255,0.45)" stroke="white" stroke-width="1.2"/>
  <circle cx="450" cy="290" r="9" fill="rgba(255,255,255,0.45)" stroke="white" stroke-width="1.2"/>
  <!-- Layer 3 -->
  <circle cx="515" cy="230" r="9" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <circle cx="515" cy="270" r="9" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <!-- Connections L1→L2 -->
  <line x1="394" y1="220" x2="441" y2="210" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="394" y1="220" x2="441" y2="250" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="394" y1="250" x2="441" y2="210" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="394" y1="250" x2="441" y2="250" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="394" y1="250" x2="441" y2="290" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="394" y1="280" x2="441" y2="250" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="394" y1="280" x2="441" y2="290" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <!-- Connections L2→L3 -->
  <line x1="459" y1="210" x2="506" y2="230" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="459" y1="250" x2="506" y2="230" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="459" y1="250" x2="506" y2="270" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="459" y1="290" x2="506" y2="270" stroke="white" stroke-width="0.8" opacity="0.35"/>

  <!-- Mechanism label -->
  <text x="450" y="322" text-anchor="middle" font-size="11" fill="white" font-weight="700" letter-spacing="1" opacity="0.9">MECHANISM</text>

  <!-- Strategy-proof badge -->
  <rect x="358" y="132" width="118" height="22" rx="11" fill="#2563eb" opacity="0.15"/>
  <rect x="358" y="132" width="118" height="22" rx="11" fill="none" stroke="#2563eb" stroke-width="1.2" opacity="0.5"/>
  <text x="417" y="147" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="700" letter-spacing="0.5">STRATEGY-PROOF</text>

  <!-- Arrows: mechanism → outcomes -->
  <line x1="556" y1="230" x2="645" y2="195" stroke="#059669" stroke-width="1.8" stroke-dasharray="6 3" opacity="0.7" marker-end="url(#arrowOut)"/>
  <line x1="556" y1="270" x2="645" y2="325" stroke="#059669" stroke-width="1.8" stroke-dasharray="6 3" opacity="0.7" marker-end="url(#arrowOut)"/>

  <!-- ── Outcome nodes (right) ──────────────────────────────── -->
  <!-- Allocation node -->
  <circle cx="700" cy="185" r="48" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="178" text-anchor="middle" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="0.5">ALLOCATION</text>
  <text x="700" y="200" text-anchor="middle" font-size="22" fill="#059669" font-weight="800">x*</text>

  <!-- Payment node -->
  <circle cx="715" cy="335" r="48" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="328" text-anchor="middle" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="0.5">PAYMENT</text>
  <text x="715" y="350" text-anchor="middle" font-size="22" fill="#059669" font-weight="800">p*</text>

  <!-- Revenue label at bottom right -->
  <rect x="615" y="420" width="240" height="36" rx="10" fill="rgba(5,150,105,0.08)" stroke="rgba(5,150,105,0.3)" stroke-width="1.2"/>
  <text x="735" y="443" text-anchor="middle" font-size="12" fill="#059669" font-weight="700" letter-spacing="0.5">↑ REVENUE-OPTIMAL</text>

  <!-- Title label bottom left -->
  <text x="40" y="458" font-size="22" fill="#1e3a8a" font-weight="800" letter-spacing="-0.5">AI for Economics</text>
  <text x="40" y="480" font-size="12" fill="#6b7280" font-weight="500">Deep Learning · Mechanism Design · Auction Theory</text>
</svg>
